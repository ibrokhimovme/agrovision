name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  lint-backend:
    name: Lint Backend Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - identity-service
          - farm-service
          - livestock-service
          - inventory-service
          - finance-service
          - notification-service
          - reporting-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.4.4
      - name: Lint ${{ matrix.service }}
        run: ruff check services/${{ matrix.service }}/app/
      - name: Format check ${{ matrix.service }}
        run: ruff format --check services/${{ matrix.service }}/app/

  test-backend:
    name: Test Backend Services
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        service:
          - identity-service
          - farm-service
          - livestock-service
          - inventory-service
          - finance-service
          - notification-service
          - reporting-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (${{ matrix.service }})
        run: |
          pip install -r shared/requirements-base.txt
          pip install -r services/${{ matrix.service }}/requirements.txt
        env:
          PIP_NO_CACHE_DIR: 1
      - name: Run tests (${{ matrix.service }})
        run: pytest services/${{ matrix.service }}/tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/

  lint-frontend:
    name: Lint & Type-check Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Type check
        run: npm run type-check
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        service:
          - api-gateway
          - identity-service
          - farm-service
          - livestock-service
          - inventory-service
          - finance-service
          - notification-service
          - reporting-service
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: docker build -t agrovision/${{ matrix.service }}:${{ github.sha }} services/${{ matrix.service }}/
