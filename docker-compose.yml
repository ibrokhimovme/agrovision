version: "3.9"

# ============================================================
# AgroVision — Development Compose
# Single command startup: docker compose up --build
#
# Build context for all services is the repo root so the
# shared/ package is accessible in every image.
# ============================================================

networks:
  agrovision-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  # ── Infrastructure ────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agrovision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agrovision_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agrovision}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - agrovision-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agrovision}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # REDISCLI_AUTH lets redis-cli ping work with password in health check
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-redis_dev}
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - agrovision-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # rabbitmq: REMOVED 2026-06-18 (M7 CLEAN-11). Confirmed unused throughout the
  # entire migration (M0 audit, M3/MD-002 decision, re-verified zero active
  # connections immediately before removal). See migration_decisions.md MD-002
  # and repository_cleanup_backlog.md CLEAN-11.

  # ── Application (Modular Monolith) ───────────────────────────────────────
  # As of 2026-06-18 (M7 cutover), this is THE deployed application — nginx
  # routes all /api/ traffic here. The 8 original microservices and RabbitMQ
  # have been removed (see migration_status.md, repository_cleanup_backlog.md
  # CLEAN-08 through CLEAN-12). Source: app/. Database: the single
  # consolidated `agrovision` database (schema-per-module).
  monolith:
    build:
      context: .
      dockerfile: Dockerfile.monolith
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agrovision}:${POSTGRES_PASSWORD:-agrovision_dev}@postgres:5432/${POSTGRES_DB:-agrovision}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379/7
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agrovision-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Frontend ──────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - agrovision-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx Reverse Proxy ───────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      monolith:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - agrovision-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
