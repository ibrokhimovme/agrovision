version: "3.9"

# ============================================================
# AgroVision — Development Hot-Reload Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Mounts source code volumes for live reload.
#
# M7 (2026-06-18): the 8 original microservices are gone (migrated into the
# modular monolith, app/ — see .project-governance/monolith-migration/).
# This override now only covers the monolith.
# ============================================================

services:

  monolith:
    volumes:
      - ./app:/app/app
      - ./shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100 --reload
